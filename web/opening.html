<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>오프닝 스터디 인쇄 - BlunderMate Lab</title>
    <meta
      name="description"
      content="Lichess 스터디를 수마다 다이어그램이 붙은 인쇄용 오프닝 연구 시트로 만듭니다."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    >
    <style>
      :root {
        color-scheme: light;
        --bg-base: #f7f7f8;
        --bg-surface: #ffffff;
        --bg-elevated: #efeff1;
        --tx: #1c1d1f;
        --tx2: #62646a;
        --tx3: #9a9ca3;
        --ac: #2b5bd7;
        --ac-lo: rgba(43, 91, 215, 0.10);
        --brd: rgba(28, 29, 31, 0.08);
        --brd2: rgba(28, 29, 31, 0.16);
        --card-ring: 0 1px 2px rgba(28, 29, 31, 0.04), 0 0 0 1px rgba(28, 29, 31, 0.06);
        --font-sans: 'Inter', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', 'Roboto Mono', monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--bg-base);
        color: var(--tx);
        font-family: var(--font-sans);
        font-size: 15px;
        line-height: 1.5;
        margin: 0;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .shell {
        margin: 0 auto;
        max-width: 640px;
        padding: 0 24px 64px;
      }

      .topbar {
        align-items: center;
        border-bottom: 1px solid var(--brd);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        justify-content: space-between;
        padding: 16px 0 14px;
      }

      .brand {
        align-items: baseline;
        display: flex;
        gap: 12px;
      }

      .brand-mark {
        font-family: var(--font-mono);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: -0.02em;
        white-space: nowrap;
      }

      .brand-mark .b {
        color: var(--tx);
      }

      .brand-mark .m {
        color: var(--ac);
      }

      .brand-mark .lab {
        color: var(--tx3);
        font-weight: 600;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: 1.1;
        margin: 0;
      }

      .back {
        color: var(--ac);
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        white-space: nowrap;
      }

      .back:hover {
        text-decoration: underline;
      }

      .lead {
        color: var(--tx2);
        margin: 20px 0 18px;
      }

      .surface {
        background: var(--bg-surface);
        border-radius: 14px;
        box-shadow: var(--card-ring);
        padding: 26px 24px;
      }

      .field {
        margin-bottom: 18px;
      }

      .field:last-of-type {
        margin-bottom: 0;
      }

      label {
        color: var(--tx);
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .hint {
        color: var(--tx2);
        font-size: 12px;
        font-weight: 400;
        margin-top: 4px;
      }

      input[type="text"],
      input[type="number"],
      select {
        background: var(--bg-surface);
        border: 1px solid var(--brd2);
        border-radius: 8px;
        color: var(--tx);
        padding: 10px 12px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
        width: 100%;
      }

      input[type="text"]:focus,
      input[type="number"]:focus,
      select:focus {
        border-color: var(--ac);
        box-shadow: 0 0 0 3px var(--ac-lo);
        outline: none;
      }

      input::placeholder {
        color: var(--tx3);
      }

      .grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(3, 1fr);
      }

      .toggle {
        align-items: center;
        display: flex;
        gap: 8px;
        font-size: 14px;
        font-weight: 400;
      }

      .toggle input {
        accent-color: var(--ac);
        height: 16px;
        width: 16px;
      }

      .actions {
        border-top: 1px solid var(--brd);
        margin-top: 22px;
        padding-top: 20px;
      }

      .primary {
        background: var(--ac);
        border: 0;
        border-radius: 8px;
        box-shadow: 0 4px 12px rgba(43, 91, 215, 0.18);
        color: #fff;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        padding: 12px 18px;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        width: 100%;
      }

      .primary:hover {
        box-shadow: 0 6px 16px rgba(43, 91, 215, 0.24);
        transform: translateY(-1px);
      }

      .primary:active {
        transform: translateY(1px);
      }

      .note {
        color: var(--tx3);
        font-size: 12px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">
            <span class="b">blunder</span><span class="m">mate</span> <span class="lab">Lab</span>
          </div>
          <h1>오프닝 스터디 인쇄</h1>
        </div>
        <a class="back" href="/">← 도구 목록</a>
      </header>

      <p class="lead">
        Lichess 스터디를 수마다 보드 다이어그램이 붙은 오프닝 연구 시트로 만듭니다.
      </p>

      <form class="surface" method="get" action="/api/study" target="_blank">
        <div class="field">
          <label for="study">Lichess 스터디 URL 또는 ID</label>
          <input
            id="study"
            name="study"
            type="text"
            required
            placeholder="https://lichess.org/study/xxxxxxxx"
            autocomplete="off"
          >
          <div class="hint">URL에 챕터 ID까지 넣으면 해당 챕터만 출력합니다.</div>
        </div>

        <div class="field">
          <label for="title">제목 (선택)</label>
          <input id="title" name="title" type="text" placeholder="스터디 이름을 그대로 쓰려면 비워두세요" autocomplete="off">
        </div>

        <div class="field grid">
          <div>
            <label for="orientation">보드 방향</label>
            <select id="orientation" name="orientation">
              <option value="white">백 시점</option>
              <option value="black">흑 시점</option>
            </select>
          </div>
          <div>
            <label for="columns">칸 수 (N×N)</label>
            <input id="columns" name="columns" type="number" value="2" min="1" max="5">
          </div>
          <div>
            <label for="maxVariationDepth">변화수 깊이</label>
            <input id="maxVariationDepth" name="maxVariationDepth" type="number" value="4" min="0" max="9">
          </div>
        </div>

        <div class="field">
          <label for="pageBreakPerChapter">챕터 구분</label>
          <select id="pageBreakPerChapter" name="pageBreakPerChapter">
            <option value="true" selected>챕터마다 새 페이지에서 시작</option>
            <option value="false">페이지를 이어서 촘촘하게</option>
          </select>
        </div>

        <div class="field">
          <label class="toggle">
            <input type="checkbox" name="mainlineOnly" value="true">
            변화수 빼고 메인라인만 출력
          </label>
        </div>

        <div class="actions">
          <button class="primary" type="submit">인쇄용 페이지 열기</button>
          <p class="note">
            새 탭에 인쇄용 시트가 열립니다. 거기서 인쇄 또는 PDF로 저장하세요.
          </p>
        </div>
      </form>
    </main>
  </body>
</html>
