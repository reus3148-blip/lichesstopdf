<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>기보 인쇄 - BlunderMate Lab</title>
    <meta
      name="description"
      content="체스 게임 PGN을 한 페이지 8개 다이어그램이 깔린 인쇄용 기보 시트로 만듭니다."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    >
    <link rel="stylesheet" href="/tokens.css">
    <style>
      .shell {
        margin: 0 auto;
        max-width: 640px;
        padding: 0 24px 64px;
      }

      .topbar {
        align-items: center;
        border-bottom: 1px solid var(--brd);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        justify-content: space-between;
        padding: 16px 0 14px;
      }

      .brand {
        align-items: baseline;
        display: flex;
        gap: 12px;
      }

      h1 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: 1.1;
        margin: 0;
      }

      .back {
        color: var(--ac);
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        white-space: nowrap;
      }

      .back:hover {
        text-decoration: underline;
      }

      .lead {
        color: var(--tx2);
        margin: 20px 0 18px;
      }

      .surface {
        background: var(--bg-surface);
        border-radius: 14px;
        box-shadow: var(--card-ring);
        padding: 26px 24px;
      }

      .field {
        margin-bottom: 18px;
      }

      .field:last-of-type {
        margin-bottom: 0;
      }

      label {
        color: var(--tx);
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }

      .hint {
        color: var(--tx2);
        font-size: 12px;
        font-weight: 400;
        margin-top: 4px;
      }

      input[type="text"],
      select,
      textarea {
        background: var(--bg-surface);
        border: 1px solid var(--brd2);
        border-radius: 8px;
        color: var(--tx);
        padding: 10px 12px;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
        width: 100%;
      }

      textarea {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 13px;
        line-height: 1.5;
        min-height: 200px;
        resize: vertical;
      }

      input[type="text"]:focus,
      select:focus,
      textarea:focus {
        border-color: var(--ac);
        box-shadow: 0 0 0 3px var(--ac-lo);
        outline: none;
      }

      input::placeholder,
      textarea::placeholder {
        color: var(--tx3);
      }

      .actions {
        border-top: 1px solid var(--brd);
        margin-top: 22px;
        padding-top: 20px;
      }

      .primary {
        background: var(--ac);
        border: 0;
        border-radius: 8px;
        box-shadow: 0 4px 12px rgba(43, 91, 215, 0.18);
        color: #fff;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
        padding: 12px 18px;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        width: 100%;
      }

      .primary:hover {
        box-shadow: 0 6px 16px rgba(43, 91, 215, 0.24);
        transform: translateY(-1px);
      }

      .primary:active {
        transform: translateY(1px);
      }

      .note {
        color: var(--tx3);
        font-size: 12px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">
            <span class="b">blunder</span><span class="m">mate</span> <span class="lab">Lab</span>
          </div>
          <h1>기보 인쇄</h1>
        </div>
        <a class="back" href="/">← 도구 목록</a>
      </header>

      <p class="lead">
        체스 게임 PGN을 붙여넣으면 한 페이지에 8개씩 보드 다이어그램이 깔린 인쇄용 기보 시트를 만듭니다.
      </p>

      <form class="surface" method="post" action="/api/study" target="_blank">
        <input type="hidden" name="layout" value="game">

        <div class="field">
          <label for="pgn">PGN</label>
          <textarea
            id="pgn"
            name="pgn"
            required
            placeholder="1. e4 e5 2. Nf3 Nc6 3. Bb5 ..."
          ></textarea>
          <div class="hint">한 PGN에 여러 게임을 넣으면 게임마다 새 페이지에서 시작합니다.</div>
        </div>

        <div class="field">
          <label for="title">제목 (선택)</label>
          <input id="title" name="title" type="text" placeholder="PGN의 대국자 이름을 그대로 쓰려면 비워두세요" autocomplete="off">
        </div>

        <div class="field">
          <label for="orientation">보드 방향</label>
          <select id="orientation" name="orientation">
            <option value="white">백 시점</option>
            <option value="black">흑 시점</option>
          </select>
        </div>

        <div class="actions">
          <button class="primary" type="submit">인쇄용 페이지 열기</button>
          <p class="note">
            새 탭에 인쇄용 시트가 열립니다. 거기서 인쇄 또는 PDF로 저장하세요.
          </p>
        </div>
      </form>
    </main>
  </body>
</html>
