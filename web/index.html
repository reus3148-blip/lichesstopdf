<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlunderMate Lab</title>
    <meta
      name="description"
      content="BlunderMate Lab - 체스 퍼즐과 오프닝 스터디를 인쇄용으로 만드는 도구 모음."
    >
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7f6;
        --paper: #ffffff;
        --ink: #172026;
        --muted: #60717c;
        --line: #d5dfdf;
        --soft: #e9f1ef;
        --teal: #176b66;
        --teal-2: #0e514f;
        --blue: #315f9f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: Arial, "Malgun Gothic", sans-serif;
        font-size: 15px;
        line-height: 1.5;
        margin: 0;
      }

      .shell {
        margin: 0 auto;
        max-width: 880px;
        padding: 48px 24px 64px;
      }

      .brand-mark {
        color: var(--teal);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        font-size: 30px;
        margin: 6px 0 8px;
      }

      .lead {
        color: var(--muted);
        margin: 0 0 36px;
        max-width: 560px;
      }

      .tools {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }

      .tool {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 14px;
        color: inherit;
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 26px 24px;
        text-decoration: none;
        transition: border-color 0.15s, transform 0.15s;
      }

      .tool:hover {
        border-color: var(--teal);
        transform: translateY(-2px);
      }

      .tool-tag {
        align-self: flex-start;
        background: var(--soft);
        border-radius: 999px;
        color: var(--teal-2);
        font-size: 12px;
        font-weight: 700;
        padding: 3px 10px;
      }

      .tool h2 {
        font-size: 19px;
        margin: 6px 0 0;
      }

      .tool p {
        color: var(--muted);
        font-size: 14px;
        margin: 0;
      }

      .tool-go {
        color: var(--teal);
        font-weight: 700;
        margin-top: 10px;
      }

      footer {
        color: var(--muted);
        font-size: 13px;
        margin-top: 44px;
      }

      footer a {
        color: var(--blue);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="brand-mark">BlunderMate Lab</div>
      <h1>인쇄용 체스 도구</h1>
      <p class="lead">
        Lichess 데이터로 종이에 출력하기 좋은 자료를 만듭니다. 원하는 도구를 고르세요.
      </p>

      <div class="tools">
        <a class="tool" href="/puzzle">
          <span class="tool-tag">Puzzle</span>
          <h2>퍼즐 인쇄</h2>
          <p>난이도와 테마로 고른 전술 퍼즐을 문제지·해답지로 출력합니다.</p>
          <span class="tool-go">퍼즐 만들기 →</span>
        </a>

        <a class="tool" href="/opening">
          <span class="tool-tag">Opening</span>
          <h2>오프닝 스터디 인쇄</h2>
          <p>Lichess 스터디를 수마다 다이어그램이 붙은 오프닝 연구 시트로 출력합니다.</p>
          <span class="tool-go">스터디 만들기 →</span>
        </a>
      </div>

      <footer>
        퍼즐 데이터는 <a href="https://database.lichess.org/#puzzles">Lichess open database</a>의
        CC0 퍼즐을 사용합니다.
      </footer>
    </main>
  </body>
</html>
