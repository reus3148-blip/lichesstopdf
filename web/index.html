<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlunderMate Lab</title>
    <meta
      name="description"
      content="BlunderMate Lab - 체스 퍼즐과 오프닝 스터디를 인쇄용으로 만드는 도구 모음."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.css"
    >
    <link rel="stylesheet" href="/tokens.css">
    <style>
      .shell {
        margin: 0 auto;
        max-width: 600px;
        padding: 0 24px 56px;
      }

      .topbar {
        align-items: center;
        border-bottom: 1px solid var(--brd);
        display: flex;
        padding: 16px 0 14px;
      }

      .intro {
        color: var(--tx2);
        margin: 22px 0 14px;
      }

      .tool-list {
        background: var(--bg-surface);
        border: 1px solid var(--brd);
        border-radius: 14px;
        overflow: hidden;
      }

      .tool-row {
        align-items: center;
        color: inherit;
        display: flex;
        gap: 14px;
        padding: 15px 16px;
        text-decoration: none;
        transition: background 0.12s ease;
      }

      .tool-row + .tool-row {
        border-top: 1px solid var(--list-divider);
      }

      .tool-row:hover {
        background: var(--press-fill);
      }

      .tool-row-text {
        display: grid;
        flex: 1;
        gap: 3px;
        min-width: 0;
      }

      .tool-row-title {
        font-size: 15px;
        font-weight: 600;
      }

      .tool-row-desc {
        color: var(--tx2);
        font-size: 13px;
      }

      .chev {
        color: var(--tx3);
        flex: none;
        font-size: 22px;
        line-height: 1;
      }

      footer {
        color: var(--tx3);
        font-size: 13px;
        margin-top: 24px;
      }

      footer a {
        color: var(--ac);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand-mark">
          <span class="b">blunder</span><span class="m">mate</span> <span class="lab">Lab</span>
        </div>
      </header>

      <p class="intro">Lichess 데이터로 종이에 출력하기 좋은 체스 자료를 만듭니다.</p>

      <nav class="tool-list">
        <a class="tool-row" href="/puzzle">
          <div class="tool-row-text">
            <div class="tool-row-title">퍼즐 인쇄</div>
            <div class="tool-row-desc">난이도와 테마로 고른 전술 퍼즐을 문제지·해답지로 출력합니다.</div>
          </div>
          <span class="chev" aria-hidden="true">›</span>
        </a>
        <a class="tool-row" href="/opening">
          <div class="tool-row-text">
            <div class="tool-row-title">오프닝 스터디 인쇄</div>
            <div class="tool-row-desc">Lichess 스터디를 수마다 다이어그램이 붙은 연구 시트로 출력합니다.</div>
          </div>
          <span class="chev" aria-hidden="true">›</span>
        </a>
        <a class="tool-row" href="/game">
          <div class="tool-row-text">
            <div class="tool-row-title">기보 인쇄</div>
            <div class="tool-row-desc">게임 PGN을 한 페이지 8개 다이어그램 시트로 출력합니다.</div>
          </div>
          <span class="chev" aria-hidden="true">›</span>
        </a>
      </nav>

      <footer>
        퍼즐 데이터는 <a href="https://database.lichess.org/#puzzles">Lichess open database</a>의
        CC0 퍼즐을 사용합니다.
      </footer>
    </div>
  </body>
</html>
