<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BlunderMate Local Lab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #faf9f7;
        --panel: #ffffff;
        --ink: #0f0f0f;
        --muted: #595959;
        --line: rgba(15, 15, 15, 0.10);
        --line-strong: rgba(15, 15, 15, 0.18);
        --soft: #f2f1ee;
        --accent: #0f0f0f;
        --accent-hover: #1f1f1f;
        --red: #b14338;
        --gold: #8a6a16;
      }
      * { box-sizing: border-box; }
      body {
        background: var(--bg);
        color: var(--ink);
        font: 13px/1.45 Inter, "Pretendard Variable", "Malgun Gothic", system-ui, sans-serif;
        margin: 0;
        -webkit-font-smoothing: antialiased;
      }
      button, input, select, textarea { font: inherit; }
      h1, h2, p { margin: 0; }

      .shell { margin: 0 auto; max-width: 1380px; padding: 12px 14px; }
      .topbar {
        align-items: baseline;
        border-bottom: 1px solid var(--line);
        display: flex;
        gap: 12px;
        justify-content: space-between;
        padding-bottom: 8px;
      }
      h1 { color: var(--ink); font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
      .endpoint { color: var(--muted); font-size: 11px; font-family: 'IBM Plex Mono', ui-monospace, monospace; }

      .layout {
        display: grid;
        gap: 10px;
        grid-template-columns: 320px minmax(0, 1fr) 240px;
        margin-top: 10px;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
      }
      .panel-title {
        align-items: center;
        display: flex;
        gap: 6px;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .panel-title h2 { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
      .pill {
        background: var(--soft);
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        font-size: 11px;
        font-weight: 600;
        padding: 1px 8px;
      }

      .field-grid { display: grid; gap: 8px; grid-template-columns: 1fr 1fr; }
      .field { display: grid; gap: 3px; }
      .field.full { grid-column: 1 / -1; }
      label { color: var(--muted); font-size: 11px; font-weight: 500; letter-spacing: 0.01em; }
      input, select, textarea {
        background: var(--panel);
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        color: var(--ink);
        min-width: 0;
        padding: 5px 8px;
        transition: border-color 0.15s ease;
        width: 100%;
      }
      input:focus, select:focus, textarea:focus {
        border-color: var(--ink);
        outline: none;
      }
      input, select { height: 30px; }
      textarea {
        font: 11px/1.4 'IBM Plex Mono', Consolas, "Cascadia Mono", monospace;
        min-height: 180px;
        resize: vertical;
        white-space: pre;
      }

      .theme-grid { display: flex; flex-wrap: wrap; gap: 4px; }
      .chip {
        background: var(--panel);
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        color: var(--ink);
        cursor: pointer;
        font-size: 11px;
        font-weight: 500;
        padding: 2px 9px;
        transition: background 0.12s ease, border-color 0.12s ease;
      }
      .chip:hover { background: var(--soft); }
      .chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

      .checks { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
      .checks label { align-items: center; color: var(--ink); display: flex; font-size: 12px; font-weight: 400; gap: 5px; }
      .checks input { accent-color: var(--accent); height: 14px; width: 14px; }

      .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
      .primary, .secondary {
        border-radius: 6px;
        cursor: pointer;
        font-weight: 500;
        font-size: 12px;
        padding: 6px 12px;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .primary { background: var(--accent); border: 1px solid var(--accent); color: #fff; }
      .primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
      .secondary { background: var(--panel); border: 1px solid var(--line-strong); color: var(--ink); }
      .secondary:hover { background: var(--soft); }
      button:disabled { cursor: wait; opacity: 0.5; }

      .status {
        border-left: 2px solid var(--ink);
        color: var(--muted);
        font-size: 12px;
        margin-top: 10px;
        padding: 4px 10px;
      }
      .status.error { border-color: var(--red); color: var(--red); }
      .status.warn { border-color: var(--gold); color: var(--gold); }

      .preview-table-wrap {
        border: 1px solid var(--line);
        border-radius: 6px;
        margin-bottom: 8px;
        max-height: 220px;
        overflow: auto;
      }
      table { border-collapse: collapse; min-width: 660px; width: 100%; }
      th, td {
        border-bottom: 1px solid var(--line);
        padding: 5px 8px;
        text-align: left;
        vertical-align: top;
      }
      th {
        background: var(--soft);
        color: var(--muted);
        font-size: 11px;
        font-weight: 500;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      td { font-size: 12px; }

      .output-list { display: grid; gap: 4px; }
      .output-list + .output-list { margin-top: 8px; }
      .output-item {
        border-bottom: 1px solid var(--line);
        font-size: 12px;
        padding-bottom: 4px;
      }
      .output-item:last-child { border-bottom: 0; padding-bottom: 0; }
      .output-item a { color: var(--ink); font-weight: 500; text-decoration: underline; text-decoration-color: var(--line-strong); text-underline-offset: 2px; }
      .output-item a:hover { text-decoration-color: var(--ink); }
      .muted { color: var(--muted); font-size: 11px; }

      @media (max-width: 1160px) {
        .layout { grid-template-columns: 1fr; }
      }
      @media (max-width: 640px) {
        .topbar { align-items: start; flex-direction: column; gap: 4px; }
        .field-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <h1>BlunderMate · Lichess DB Workbench</h1>
        <div class="endpoint">127.0.0.1:8765</div>
      </header>

      <div class="layout">
        <section class="panel">
          <div class="panel-title">
            <h2>Filters</h2>
            <span id="dbPill" class="pill">loading</span>
          </div>

          <div class="field-grid">
            <div class="field full">
              <label for="inputFile">데이터 파일</label>
              <select id="inputFile"></select>
            </div>
            <div class="field full">
              <label for="title">문서 제목</label>
              <input id="title" value="BlunderMate Puzzle Set">
            </div>
            <div class="field">
              <label for="layout">양식</label>
              <select id="layout">
                <option value="print-minimal" selected>print-minimal</option>
                <option value="standard">standard</option>
                <option value="instagram">instagram</option>
              </select>
            </div>
            <div class="field">
              <label for="match">테마 조건</label>
              <select id="match">
                <option value="any">any</option>
                <option value="all">all</option>
              </select>
            </div>
            <div class="field">
              <label for="minRating">최소 레이팅</label>
              <input id="minRating" type="number" placeholder="1200">
            </div>
            <div class="field">
              <label for="maxRating">최대 레이팅</label>
              <input id="maxRating" type="number" placeholder="1800">
            </div>
            <div class="field">
              <label for="minPopularity">최소 인기도</label>
              <input id="minPopularity" type="number" value="80">
            </div>
            <div class="field">
              <label for="count">문제 수</label>
              <input id="count" type="number" value="12" min="1" max="500">
            </div>
            <div class="field">
              <label for="seed">seed</label>
              <input id="seed" type="number" value="42">
            </div>
            <div class="field">
              <label for="workspaceName">workspace CSV</label>
              <input id="workspaceName" value="local_workspace.csv">
            </div>
            <div class="field full">
              <label for="customTheme">직접 입력 테마</label>
              <input id="customTheme" placeholder="예: fork, mateIn2">
            </div>
            <div class="field full">
              <label>테마</label>
              <div id="themeGrid" class="theme-grid"></div>
            </div>
          </div>

          <div class="checks">
            <label><input id="htmlOnly" type="checkbox">HTML만</label>
            <label><input id="splitOutput" type="checkbox" checked>문제/정답 분리</label>
            <label><input id="solutionsAtEnd" type="checkbox" checked>해답 뒤에</label>
          </div>

          <div class="actions">
            <button id="previewButton" class="primary" type="button">DB 가져오기</button>
            <button id="generateButton" class="secondary" type="button">HTML/PDF 생성</button>
            <button id="refreshButton" class="secondary" type="button">새로고침</button>
          </div>

          <div id="status" class="status">로컬 서버를 확인하는 중입니다.</div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Editable Workspace</h2>
            <span id="previewCount" class="pill">0 rows</span>
          </div>

          <div class="preview-table-wrap">
            <table>
              <thead>
                <tr><th>ID</th><th>Rating</th><th>Pop</th><th>Themes</th><th>Moves</th></tr>
              </thead>
              <tbody id="previewRows">
                <tr><td colspan="5" class="muted">No rows loaded</td></tr>
              </tbody>
            </table>
          </div>

          <textarea id="csvText" spellcheck="false"></textarea>
          <div class="actions">
            <button id="saveButton" class="primary" type="button">Workspace 저장</button>
            <button id="clearButton" class="secondary" type="button">비우기</button>
          </div>
        </section>

        <aside class="panel">
          <div class="panel-title"><h2>Outputs</h2><span class="pill">output</span></div>
          <div id="resultLinks" class="output-list"></div>
          <div id="outputList" class="output-list"></div>
        </aside>
      </div>
    </main>

    <script>
      const state = { selectedThemes: new Set(["fork"]), themePresets: [], dataFiles: [] };
      const $ = (id) => document.getElementById(id);

      const escapeHtml = (v) => String(v ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;").replaceAll('"', "&quot;");

      const formatSize = (b) => !b ? "0 B"
        : b < 1024 * 1024 ? `${Math.round(b / 1024)} KB`
        : `${(b / 1024 / 1024).toFixed(1)} MB`;

      function setStatus(message, kind = "ok") {
        const status = $("status");
        status.textContent = message;
        status.classList.toggle("error", kind === "error");
        status.classList.toggle("warn", kind === "warn");
      }

      function renderThemes() {
        $("themeGrid").innerHTML = state.themePresets.map((t) => {
          const active = state.selectedThemes.has(t) ? " active" : "";
          return `<button class="chip${active}" type="button" data-theme="${escapeHtml(t)}">${escapeHtml(t)}</button>`;
        }).join("");
      }

      function renderDataFiles(files) {
        const select = $("inputFile");
        if (!files.length) {
          select.innerHTML = "<option value=\"\">data 폴더에 CSV가 없습니다</option>";
          $("dbPill").textContent = "no data";
          return;
        }
        select.innerHTML = files.map((f) =>
          `<option value="${escapeHtml(f.name)}">${escapeHtml(f.name)} (${formatSize(f.size)})</option>`
        ).join("");
        const fullDb = files.find((f) => f.name === "lichess_db_puzzle.csv.zst");
        if (fullDb) select.value = fullDb.name;
        $("dbPill").textContent = fullDb ? "full DB found" : "CSV ready";
      }

      function renderOutputs(files) {
        $("outputList").innerHTML = !files.length
          ? "<div class=\"muted\">No generated files</div>"
          : files.map((f) => `
            <div class="output-item">
              <a href="${escapeHtml(f.url)}" target="_blank" rel="noreferrer">${escapeHtml(f.name)}</a>
              <div class="muted">${formatSize(f.size)}</div>
            </div>`).join("");
      }

      function renderPreviewRows(rows) {
        $("previewCount").textContent = `${rows.length} rows`;
        $("previewRows").innerHTML = !rows.length
          ? "<tr><td colspan=\"5\" class=\"muted\">No rows loaded</td></tr>"
          : rows.map((r) => `
            <tr>
              <td><a href="${escapeHtml(r.GameUrl)}" target="_blank" rel="noreferrer">${escapeHtml(r.PuzzleId)}</a></td>
              <td>${escapeHtml(r.Rating)}</td>
              <td>${escapeHtml(r.Popularity)}</td>
              <td>${escapeHtml(r.Themes)}</td>
              <td>${escapeHtml(r.Moves)}</td>
            </tr>`).join("");
      }

      function renderResultLinks(data) {
        const labels = [
          ["문제지 PDF", data.questionsPdfUrl], ["정답지 PDF", data.answersPdfUrl], ["PDF", data.pdfUrl],
          ["문제지 HTML", data.questionsHtmlUrl], ["정답지 HTML", data.answersHtmlUrl], ["HTML", data.htmlUrl],
        ].filter(([, url]) => url);
        $("resultLinks").innerHTML = !labels.length
          ? "<div class=\"muted\">No result links</div>"
          : labels.map(([label, url]) =>
              `<div class="output-item"><a href="${escapeHtml(url)}" target="_blank" rel="noreferrer">${label}</a></div>`
            ).join("");
      }

      const numberOrEmpty = (id) => $(id).value.trim() === "" ? "" : Number($(id).value);

      const payload = () => ({
        input: $("inputFile").value,
        title: $("title").value,
        layout: $("layout").value,
        themes: Array.from(state.selectedThemes),
        customTheme: $("customTheme").value,
        match: $("match").value,
        minRating: numberOrEmpty("minRating"),
        maxRating: numberOrEmpty("maxRating"),
        minPopularity: numberOrEmpty("minPopularity"),
        count: numberOrEmpty("count"),
        seed: numberOrEmpty("seed"),
        htmlOnly: $("htmlOnly").checked,
        splitOutput: $("splitOutput").checked,
        solutionsAtEnd: $("solutionsAtEnd").checked,
      });

      async function postJson(url, body) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await response.json();
        if (!data.ok) throw new Error(data.error || "Request failed.");
        return data;
      }

      async function withButton(id, message, run) {
        const button = $(id);
        button.disabled = true;
        if (message) setStatus(message, "warn");
        try { await run(); }
        catch (error) { setStatus(error.message, "error"); }
        finally { button.disabled = false; }
      }

      async function refresh() {
        const response = await fetch("/api/status");
        const data = await response.json();
        state.themePresets = data.themePresets || [];
        state.dataFiles = data.dataFiles || [];
        renderThemes();
        renderDataFiles(state.dataFiles);
        renderOutputs(data.outputFiles || []);
        setStatus("로컬 DB workbench가 준비되었습니다.");
      }

      $("themeGrid").addEventListener("click", (event) => {
        const button = event.target.closest("[data-theme]");
        if (!button) return;
        const theme = button.dataset.theme;
        state.selectedThemes.has(theme)
          ? state.selectedThemes.delete(theme)
          : state.selectedThemes.add(theme);
        renderThemes();
      });

      $("previewButton").addEventListener("click", () => withButton(
        "previewButton",
        "DB를 스캔하는 중입니다. 전체 .zst는 시간이 조금 걸릴 수 있습니다.",
        async () => {
          const data = await postJson("/api/preview", payload());
          $("csvText").value = data.csvText || "";
          renderPreviewRows(data.puzzles || []);
          setStatus(`${data.input}에서 ${data.count}개 퍼즐을 가져왔습니다.`);
        }
      ));

      $("saveButton").addEventListener("click", () => withButton(
        "saveButton", null,
        async () => {
          const data = await postJson("/api/save-csv", {
            filename: $("workspaceName").value,
            csvText: $("csvText").value,
          });
          renderDataFiles(data.dataFiles || []);
          $("inputFile").value = data.name;
          setStatus(`${data.name} 저장 완료: ${data.rows} rows`);
        }
      ));

      $("generateButton").addEventListener("click", () => withButton(
        "generateButton", "HTML/PDF를 생성하는 중입니다.",
        async () => {
          const data = await postJson("/api/generate", payload());
          renderResultLinks(data);
          renderOutputs(data.outputFiles || []);
          setStatus(`${data.count}개 퍼즐로 생성했습니다.`);
        }
      ));

      $("refreshButton").addEventListener("click", refresh);
      $("clearButton").addEventListener("click", () => {
        $("csvText").value = "";
        renderPreviewRows([]);
        setStatus("Workspace를 비웠습니다.");
      });

      refresh();
    </script>
  </body>
</html>
